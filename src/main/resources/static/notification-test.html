<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        input, button { padding: 8px; margin: 6px 0; width: 350px; }
        #log { margin-top: 20px; white-space: pre-wrap; border: 1px solid #ccc; padding: 12px; min-height: 200px; }
    </style>
</head>
<body>
<h2>Realtime Notifications Test</h2>

<div>
    <input id="token" type="text" placeholder="JWT token">
</div>

<div>
    <input id="username" type="text" placeholder="Username for topic subscription">
</div>

<div>
    <button onclick="connect()">Connect</button>
</div>

<div id="log"></div>

<script>
    let stompClient = null;

    function log(text) {
        const box = document.getElementById('log');
        box.textContent += text + '\n';
        box.scrollTop = box.scrollHeight;
    }

    function connect() {
        const token = document.getElementById('token').value.trim();
        const username = document.getElementById('username').value.trim();

        if (!token || !username) {
            alert('Enter token and username');
            return;
        }

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect(
            { Authorization: 'Bearer ' + token },
            function () {
                log('Connected');

                stompClient.subscribe('/topic/notifications/' + username, function (message) {
                    const data = JSON.parse(message.body);
                    log('Notification received: ' + JSON.stringify(data, null, 2));
                });
            },
            function (error) {
                log('Connection error: ' + error);
            }
        );
    }
</script>
</body>
</html>
